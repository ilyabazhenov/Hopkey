<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="360" fill="#f7f4ef"/>

  <style>
    .label { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3b3935; }
    .note { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #706b63; }
    .bar { fill: #fdfdfd; stroke: #d7d2c8; }
    .slot { fill: #ffffff; stroke: #ded8ce; }
    .glyph { fill: #111111; }
    .ghost { fill: #111111; opacity: 0.18; }
  </style>

  <text x="40" y="42" class="label">Hopkey menu bar icon concepts</text>
  <text x="40" y="64" class="note">Одноцветные template-силуэты: macOS сама перекрасит их под светлую/тёмную тему.</text>

  <g transform="translate(40 96)">
    <rect class="bar" x="0" y="0" width="820" height="36" rx="11"/>
    <circle cx="620" cy="18" r="8" fill="#111"/>
    <circle cx="650" cy="18" r="8" fill="#111"/>
    <circle cx="680" cy="18" r="8" fill="#111"/>
  </g>

  <!-- Variant A: key + ears -->
  <g transform="translate(120 91)">
    <g transform="translate(0 0) scale(1)">
      <path class="glyph" d="M12 27c0-4 3-7 7-7h22c4 0 7 3 7 7v9c0 4-3 7-7 7H19c-4 0-7-3-7-7v-9Z"/>
      <path class="glyph" d="M23 20c-5-7-7-15-5-18 3-2 9 3 12 13 1 2 1 4 1 5h-8Z"/>
      <path class="glyph" d="M33 20c1-8 5-16 9-17 4-1 6 7 3 16l-1 1H33Z"/>
      <rect x="20" y="29" width="20" height="3" rx="1.5" fill="#f7f4ef"/>
    </g>
  </g>

  <!-- Variant B: rabbit head in key -->
  <g transform="translate(300 91)">
    <g transform="translate(0 0) scale(1)">
      <path class="glyph" d="M11 28c0-5 4-8 9-8h22c5 0 9 3 9 8v8c0 5-4 8-9 8H20c-5 0-9-3-9-8v-8Z"/>
      <path class="glyph" d="M23 21c-4-9-4-16-1-18 4-2 8 5 9 16l-1 2h-7Z"/>
      <path class="glyph" d="M35 21c1-10 6-18 10-17 4 1 4 9-1 17h-9Z"/>
      <circle cx="25" cy="31" r="2.2" fill="#f7f4ef"/>
      <circle cx="38" cy="31" r="2.2" fill="#f7f4ef"/>
    </g>
  </g>

  <!-- Variant C: hop motion -->
  <g transform="translate(480 91)">
    <g transform="translate(0 0) scale(1)">
      <path class="ghost" d="M10 19c6-10 15-15 27-15 3 0 5 2 5 4 0 3-2 5-5 5-9 0-15 3-20 11-1 3-4 4-6 2-2-1-3-4-1-7Z"/>
      <path class="glyph" d="M14 29c0-5 4-8 9-8h23c5 0 8 3 8 8v8c0 5-3 8-8 8H23c-5 0-9-3-9-8v-8Z"/>
      <path class="glyph" d="M28 21c-4-8-5-15-2-18 4-2 9 4 12 16l-1 2h-9Z"/>
      <path class="glyph" d="M39 21c1-9 5-17 9-18 4 0 6 7 2 17l-1 1H39Z"/>
      <path fill="#f7f4ef" d="M27 32h14v3H27z"/>
    </g>
  </g>

  <!-- Large previews -->
  <g transform="translate(86 178) scale(2.8)">
    <path class="glyph" d="M12 27c0-4 3-7 7-7h22c4 0 7 3 7 7v9c0 4-3 7-7 7H19c-4 0-7-3-7-7v-9Z"/>
    <path class="glyph" d="M23 20c-5-7-7-15-5-18 3-2 9 3 12 13 1 2 1 4 1 5h-8Z"/>
    <path class="glyph" d="M33 20c1-8 5-16 9-17 4-1 6 7 3 16l-1 1H33Z"/>
    <rect x="20" y="29" width="20" height="3" rx="1.5" fill="#f7f4ef"/>
  </g>
  <text x="96" y="330" class="label">A. Клавиша + уши</text>
  <text x="96" y="350" class="note">Самый чистый силуэт</text>

  <g transform="translate(336 178) scale(2.8)">
    <path class="glyph" d="M11 28c0-5 4-8 9-8h22c5 0 9 3 9 8v8c0 5-4 8-9 8H20c-5 0-9-3-9-8v-8Z"/>
    <path class="glyph" d="M23 21c-4-9-4-16-1-18 4-2 8 5 9 16l-1 2h-7Z"/>
    <path class="glyph" d="M35 21c1-10 6-18 10-17 4 1 4 9-1 17h-9Z"/>
    <circle cx="25" cy="31" r="2.2" fill="#f7f4ef"/>
    <circle cx="38" cy="31" r="2.2" fill="#f7f4ef"/>
  </g>
  <text x="346" y="330" class="label">B. Морда в клавише</text>
  <text x="346" y="350" class="note">Больше маскота, хуже 16 pt</text>

  <g transform="translate(596 178) scale(2.8)">
    <path class="ghost" d="M10 19c6-10 15-15 27-15 3 0 5 2 5 4 0 3-2 5-5 5-9 0-15 3-20 11-1 3-4 4-6 2-2-1-3-4-1-7Z"/>
    <path class="glyph" d="M14 29c0-5 4-8 9-8h23c5 0 8 3 8 8v8c0 5-3 8-8 8H23c-5 0-9-3-9-8v-8Z"/>
    <path class="glyph" d="M28 21c-4-8-5-15-2-18 4-2 9 4 12 16l-1 2h-9Z"/>
    <path class="glyph" d="M39 21c1-9 5-17 9-18 4 0 6 7 2 17l-1 1H39Z"/>
    <path fill="#f7f4ef" d="M27 32h14v3H27z"/>
  </g>
  <text x="606" y="330" class="label">C. Прыжок</text>
  <text x="606" y="350" class="note">Динамичнее, но шумнее</text>
</svg>
